<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Love Link 💖</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff4e8a,#ff9ecf);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* Card for Generator / Lock */
.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
width:90%;
max-width:400px;
text-align:center;
position:relative;
}

/* Input */
input{
width:100%;
padding:12px;
border-radius:25px;
border:1px solid #ff4e8a;
margin-bottom:15px;
font-size:16px;
}

/* Buttons */
button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4e8a;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* Proposal Mode */
.proposal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(135deg,#ff4e8a,#ff2d6f);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
padding:20px;
overflow:hidden;
}

#message{
min-height:80px;
font-size:16px;
margin-bottom:20px;
}

.buttons{
margin-top:20px;
position:relative;
height:80px;
width:250px;
}

.buttons button{
position:absolute;
}

#yes{left:10%;}
#no{right:10%; background:#333;}

.ring{
font-size:60px;
animation:spin 2s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* Hearts & Petals */
.heart, .petal{
position:absolute;
animation:float linear infinite;
opacity:0.8;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* Fireworks */
.firework{
position:absolute;
width:5px;
height:5px;
border-radius:50%;
background:white;
pointer-events:none;
}
</style>
</head>
<body>

<div id="lockScreen" class="card">
<h1>🔒 Enter Partner Name</h1>
<input id="partnerName" placeholder="Enter Partner Name ❤️">
<button onclick="unlock()">Unlock & Generate Link</button>
</div>

<div id="generator" class="card" style="display:none">
<h1>Create Love Link 💞</h1>
<div id="generatedLink"></div>
<button onclick="copyLink()">Copy Link 💌</button>
</div>

<script>

/* GitHub Pages Base URL */
const baseUrl = "https://kamesh-the-hacker.github.io/love/";

/* Proposal Detection */
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
if(name){
showProposal(name);
}

/* Unlock Screen */
function unlock(){
const inputName=document.getElementById("partnerName").value.trim();
if(inputName===""){alert("Enter a name ❤️"); return;}
document.getElementById("lockScreen").style.display="none";
document.getElementById("generator").style.display="block";
const finalUrl = baseUrl + "?name=" + encodeURIComponent(inputName);
document.getElementById("generatedLink").innerHTML = `<b>${finalUrl}</b>`;
window.generatedLink = finalUrl;
}

/* Copy Link */
function copyLink(){
navigator.clipboard.writeText(window.generatedLink);
alert("Link copied! 💌 Send it to your partner!");
}

/* Proposal Mode */
function showProposal(loverName){

document.getElementById("lockScreen")?.remove();
document.getElementById("generator")?.remove();

const div=document.createElement("div");
div.className="proposal";
div.innerHTML=`
<h1>Hey ${loverName} ❤️</h1>
<p id="message"></p>
<div class="buttons">
<button id="yes" onclick="accepted('${loverName}')">Yes 💖</button>
<button id="no" onmouseover="moveNo()">No 😅</button>
</div>
`;
document.body.appendChild(div);

/* Typewriter Message */
const text="From the moment I met you, my heart knew you were special. Will you be mine forever?";
let i=0;
function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,40);
}}
typeWriter();

/* Floating Hearts & Petals */
setInterval(()=>{
const e=document.createElement(Math.random()<0.5?"div":"div");
e.className=Math.random()<0.5?"heart":"petal";
e.innerHTML=Math.random()<0.5?"❤️":"🌹";
e.style.left=Math.random()*100+"vw";
e.style.fontSize=(Math.random()*25+15)+"px";
e.style.animationDuration=(Math.random()*3+5)+"s";
document.body.appendChild(e);
setTimeout(()=>e.remove(),8000);
},300);

}

/* Move No Button */
function moveNo(){
const btn=document.getElementById("no");
btn.style.position="fixed";
btn.style.left=Math.random()*80+"vw";
btn.style.top=Math.random()*80+"vh";
}

/* Accepted - Fireworks + Ring */
function accepted(name){
document.body.innerHTML=`
<div class="proposal">
<div class="ring">💍</div>
<h1>Yay ${name}! ❤️</h1>
<p>You just made me the happiest person alive! 💞</p>
</div>
`;

/* Fireworks Animation */
for(let i=0;i<50;i++){
const f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*50+"vh";
f.style.width=Math.random()*6+4+"px";
f.style.height=f.style.width;
f.style.background=`hsl(${Math.random()*360},100%,75%)`;
document.body.appendChild(f);
explode(f);
}
}

function explode(el){
let angle=Math.random()*2*Math.PI;
let speed=Math.random()*6+2;
let dx=speed*Math.cos(angle);
let dy=speed*Math.sin(angle);
let life=60;
let id=setInterval(()=>{
let left=parseFloat(el.style.left);
let top=parseFloat(el.style.top);
el.style.left=(left+dx)+"px";
el.style.top=(top+dy)+"px";
dy+=0.3; // gravity
life--;
if(life<=0){el.remove(); clearInterval(id);}
},20);
}
</script>
</body>
</html>
